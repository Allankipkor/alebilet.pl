services:
  - type: web
    name: alebilet-replica
    env: node
    buildCommand: npm run install-all && npm run build-frontend
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/db.json
    disk:
      name: alebilet-db-data
      mountPath: /var/data
      sizeGB: 1
